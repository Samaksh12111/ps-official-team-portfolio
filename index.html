<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Globe Hand Control</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; }
  canvas#bg { position:fixed; inset:0; z-index:0; }

  /* Camera feed - small corner */
  #cam-wrap {
    position:fixed; bottom:16px; right:16px; z-index:20;
    border:1px solid rgba(0,200,255,0.3);
    border-radius:8px; overflow:hidden;
    box-shadow:0 0 16px rgba(0,180,255,0.2);
  }
  #webcam {
    width:160px; height:120px;
    object-fit:cover; display:block;
    transform:scaleX(-1); opacity:0.8;
  }
  #hcanvas {
    position:absolute; top:0; left:0;
    width:160px; height:120px;
    transform:scaleX(-1);
  }

  /* Gesture HUD */
  #hud {
    position:fixed; top:16px; left:50%;
    transform:translateX(-50%);
    font-family:'Courier New', monospace;
    font-size:13px; letter-spacing:0.2em;
    color:rgba(0,220,255,0.6);
    text-shadow:0 0 8px rgba(0,200,255,0.5);
    text-align:center;
    z-index:20; pointer-events:none;
  }

  /* Finger dots indicator */
  #finger-dots {
    position:fixed; bottom:16px; left:16px;
    display:flex; gap:8px; z-index:20;
  }
  .fdot {
    width:12px; height:12px; border-radius:50%;
    border:1.5px solid rgba(0,200,255,0.4);
    background:rgba(0,200,255,0.05);
    transition:all 0.15s;
  }
  .fdot.on {
    background:rgba(0,200,255,0.9);
    box-shadow:0 0 8px rgba(0,200,255,1);
    border-color:rgba(0,200,255,1);
  }

  /* Loading overlay */
  #loading {
    position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:14px; z-index:100;
    font-family:'Courier New', monospace;
    color:rgba(0,200,255,0.7);
    transition:opacity 0.8s;
  }
  #loading .ltxt { font-size:13px; letter-spacing:0.3em; }
  #loading .lbar { width:200px; height:2px; background:rgba(0,200,255,0.1); border-radius:2px; }
  #loading .lfill { height:100%; background:#00e5ff; box-shadow:0 0 8px #00e5ff; border-radius:2px; animation:lf 2s ease forwards; }
  @keyframes lf { from{width:0} to{width:100%} }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="hud">✋ HAND CONTROL ACTIVE</div>

<div id="finger-dots">
  <div class="fdot" id="f0"></div>
  <div class="fdot" id="f1"></div>
  <div class="fdot" id="f2"></div>
  <div class="fdot" id="f3"></div>
  <div class="fdot" id="f4"></div>
</div>

<div id="cam-wrap">
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="hcanvas"></canvas>
</div>

<div id="loading">
  <div class="ltxt">INITIALIZING CAMERA...</div>
  <div class="lbar"><div class="lfill"></div></div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

<script>
/* ═══════════════════════════════════════
   GLOBE CANVAS
═══════════════════════════════════════ */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
});

/* Stars */
let stars = [];
function initStars() {
  stars = Array.from({length:280}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.3+0.2,
    a: Math.random(),
    da: (Math.random()*0.006+0.002)*(Math.random()<0.5?1:-1)
  }));
}
initStars();

/* Teal arc scatter top-right */
const arcP = Array.from({length:500}, () => {
  const ang = Math.random()*Math.PI*0.65-0.05;
  const d   = Math.random()*200+50;
  return {
    ox: W*0.75+Math.cos(ang)*d,
    oy: H*0.08+Math.sin(ang)*d,
    r: Math.random()*1.5+0.3,
    a: Math.random()*0.7+0.2,
    da:(Math.random()*0.005+0.002)*(Math.random()<0.5?1:-1),
    hue:Math.random()*40+150
  };
});

/* Globe */
const DOTS = 1800;
let globeX = 0, globeY = 0;   // center offset (for move gesture)
let globeScale = 1;            // current visual scale
let targetScale = 1;           // smooth target

let rotX = 0, rotY = 0;
const RX_SPEED = 0.003, RY_SPEED = 0.005;

function fibSphere(n) {
  const pts=[], phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<n;i++){
    const y=1-(i/(n-1))*2, r=Math.sqrt(1-y*y), t=phi*i;
    pts.push([Math.cos(t)*r, y, Math.sin(t)*r]);
  }
  return pts;
}
const globePts = fibSphere(DOTS);

function rotX3(p,a){const[x,y,z]=p;return[x,y*Math.cos(a)-z*Math.sin(a),y*Math.sin(a)+z*Math.cos(a)];}
function rotY3(p,a){const[x,y,z]=p;return[x*Math.cos(a)+z*Math.sin(a),y,-x*Math.sin(a)+z*Math.cos(a)];}

function drawFrame() {
  ctx.clearRect(0,0,W,H);

  // BG
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  bg.addColorStop(0,'rgba(0,10,30,1)');
  bg.addColorStop(0.6,'rgba(0,4,12,1)');
  bg.addColorStop(1,'#000');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    s.a+=s.da; if(s.a<=0||s.a>=1) s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${s.a.toFixed(2)})`; ctx.fill();
  }

  // Arc particles
  for(const p of arcP){
    p.a+=p.da; if(p.a<=0.1||p.a>=0.9) p.da*=-1;
    ctx.beginPath(); ctx.arc(p.ox,p.oy,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},100%,55%,${p.a.toFixed(2)})`; ctx.fill();
  }

  // Smooth scale
  globeScale += (targetScale - globeScale) * 0.1;

  const R  = Math.min(W,H) * 0.38 * globeScale;
  const cx = W/2 + globeX;
  const cy = H/2 + globeY;

  rotX += RX_SPEED; rotY += RY_SPEED;

  const projected = globePts.map(pt => {
    let p = rotX3(pt, rotX);
    p = rotY3(p, rotY);
    const [x,y,z] = p;
    const depth = (z+1)/2;
    return {sx:cx+x*R, sy:cy+y*R, depth};
  });
  projected.sort((a,b)=>a.depth-b.depth);

  for(const {sx,sy,depth} of projected){
    const a   = depth*0.85+0.1;
    const dr  = depth*2.2+0.4;
    const hue = 195+depth*20;
    const lgt = Math.floor(40+depth*45);
    ctx.beginPath(); ctx.arc(sx,sy,dr,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},100%,${lgt}%,${a.toFixed(2)})`; ctx.fill();
  }

  // Inner glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.55);
  glow.addColorStop(0,'rgba(0,120,255,0.09)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,R*0.55,0,Math.PI*2); ctx.fill();

  requestAnimationFrame(drawFrame);
}
requestAnimationFrame(drawFrame);

/* ═══════════════════════════════════════
   HAND TRACKING
═══════════════════════════════════════ */
const videoEl  = document.getElementById('webcam');
const hCanvas  = document.getElementById('hcanvas');
const hCtx     = hCanvas.getContext('2d');
hCanvas.width  = 160; hCanvas.height = 120;

const hudEl    = document.getElementById('hud');
const fdots    = [0,1,2,3,4].map(i=>document.getElementById('f'+i));
const loadEl   = document.getElementById('loading');

// Count extended fingers from landmarks
function countFingers(lm) {
  let count = 0;
  // Thumb: tip.x vs mcp.x (mirrored - use x axis)
  const thumbOpen = Math.abs(lm[4].x - lm[2].x) > 0.06;
  if (thumbOpen) count++;
  // Other 4 fingers: tip.y < pip.y means extended
  const tips = [8,12,16,20], pips = [6,10,14,18];
  for(let i=0;i<4;i++){
    if(lm[tips[i]].y < lm[pips[i]].y) count++;
  }
  return count;
}

// Get index finger tip position (normalized 0..1, mirrored x)
function indexPos(lm) {
  return { x: 1 - lm[8].x, y: lm[8].y };
}

let prevIndexPos = null;
let gestureMode  = 'none'; // 'zoom_in' | 'zoom_out' | 'move' | 'none'

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});
hands.setOptions({maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.6});

hands.onResults(results => {
  hCtx.clearRect(0,0,160,120);

  if(!results.multiHandLandmarks || results.multiHandLandmarks.length===0){
    prevIndexPos = null;
    hudEl.textContent = '✋ SHOW YOUR HAND';
    fdots.forEach(d=>d.classList.remove('on'));
    return;
  }

  const lm = results.multiHandLandmarks[0];

  // Draw hand skeleton on small canvas
  drawConnectors(hCtx, lm, HAND_CONNECTIONS, {color:'rgba(0,200,255,0.4)', lineWidth:1});
  drawLandmarks(hCtx, lm, {color:'rgba(0,220,255,0.9)', lineWidth:1, radius:2});

  const fingers = countFingers(lm);

  // Update finger dot indicators
  fdots.forEach((d,i) => {
    // Simple: light up dots based on count
    d.classList.toggle('on', i < fingers);
  });

  // ── GESTURE LOGIC ──
  if (fingers === 5) {
    // ALL 5 open → ZOOM IN
    gestureMode = 'zoom_in';
    targetScale = Math.min(4.0, targetScale + 0.025);
    hudEl.textContent = '🖐 5 UNGLI → BADA HO RAHA HAI ↑';
    hudEl.style.color = 'rgba(0,255,150,0.8)';
    prevIndexPos = null;

  } else if (fingers === 0) {
    // FIST → ZOOM OUT
    gestureMode = 'zoom_out';
    targetScale = Math.max(0.2, targetScale - 0.025);
    hudEl.textContent = '✊ MUTHTHI → CHOTA HO RAHA HAI ↓';
    hudEl.style.color = 'rgba(255,80,80,0.8)';
    prevIndexPos = null;

  } else if (fingers === 1) {
    // 1 FINGER → MOVE
    gestureMode = 'move';
    hudEl.textContent = '☝️ 1 UNGLI → MOVE KAR';
    hudEl.style.color = 'rgba(0,200,255,0.8)';

    const cur = indexPos(lm);
    if (prevIndexPos) {
      const dx = (cur.x - prevIndexPos.x) * W * 1.8;
      const dy = (cur.y - prevIndexPos.y) * H * 1.8;
      globeX = Math.max(-W*0.4, Math.min(W*0.4, globeX + dx));
      globeY = Math.max(-H*0.4, Math.min(H*0.4, globeY + dy));
    }
    prevIndexPos = cur;

  } else {
    gestureMode = 'none';
    hudEl.textContent = `${fingers === 2 ? '✌️' : '🤟'} ${fingers} UNGLI — WAITING`;
    hudEl.style.color = 'rgba(0,200,255,0.5)';
    prevIndexPos = null;
  }
});

// Start camera
const camera = new Camera(videoEl, {
  onFrame: async () => { await hands.send({image: videoEl}); },
  width: 320, height: 240
});

camera.start().then(() => {
  setTimeout(() => {
    loadEl.style.opacity = '0';
    setTimeout(() => loadEl.style.display='none', 800);
  }, 1800);
}).catch(err => {
  document.querySelector('#loading .ltxt').textContent = '⚠ CAMERA PERMISSION DENIED';
  console.error(err);
});
</script>
</body>
</html>

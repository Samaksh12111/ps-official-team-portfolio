<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Sphere & Ring</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, sphereParticles, ringParticles;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Create Sphere Particles (The Blue Core)
            const sphereGeometry = new THREE.SphereGeometry(1.5, 64, 64);
            const sphereMaterial = new THREE.PointsMaterial({
                color: 0x00aaff,
                size: 0.02,
                transparent: true,
                opacity: 0.8
            });
            sphereParticles = new THREE.Points(sphereGeometry, sphereMaterial);
            scene.add(sphereParticles);

            // 5. Create Ring Particles (The Green Ring)
            const ringGeometry = new THREE.TorusGeometry(2.5, 0.3, 16, 100);
            const ringMaterial = new THREE.PointsMaterial({
                color: 0x00ffcc,
                size: 0.015,
                transparent: true,
                opacity: 0.6
            });
            ringParticles = new THREE.Points(ringGeometry, ringMaterial);
            ringParticles.rotation.x = Math.PI / 2; // Ring ko horizontal karne ke liye
            scene.add(ringParticles);

            // 6. Background Stars
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 5000;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.005, color: 0xffffff });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            animate();
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotation effect
            sphereParticles.rotation.y += 0.002;
            ringParticles.rotation.z += 0.005;
            
            // Mouse movement se thoda tilt (Optional interactive touch)
            renderer.render(scene, camera);
        }

        // Resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

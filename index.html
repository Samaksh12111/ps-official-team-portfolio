<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Sphere - PS</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            touch-action: none; /* Mobile par scrolling rokne ke liye */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, sphereParticles, controls;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. Orbit Controls (Zoom aur Rotation ke liye)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Smooth movement
            controls.dampingFactor = 0.05;
            controls.enablePan = false; // Sirf zoom aur rotate rakha hai

            // 5. Create Sphere Particles (Blue Core)
            // Particle density badhane ke liye segments 100 kiye hain
            const sphereGeometry = new THREE.SphereGeometry(1.8, 100, 100);
            const sphereMaterial = new THREE.PointsMaterial({
                color: 0x00aaff,
                size: 0.015,
                transparent: true,
                opacity: 0.9
            });
            sphereParticles = new THREE.Points(sphereGeometry, sphereMaterial);
            scene.add(sphereParticles);

            // 6. Background Stars
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 3000;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.007, color: 0xffffff });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            animate();
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Sphere halka sa rotate hota rahega automatic bhi
            sphereParticles.rotation.y += 0.001;

            // Controls ko update karna zaroori hai damping ke liye
            controls.update();

            renderer.render(scene, camera);
        }

        // Resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
